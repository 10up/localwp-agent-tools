name: CI

on:
    pull_request:
    workflow_call:

jobs:
    setup:
        name: Install dependencies
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Cache node_modules
              id: cache-modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - name: Install dependencies
              if: steps.cache-modules.outputs.cache-hit != 'true'
              run: npm ci

    lint:
        name: Lint
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - run: npm run lint

    format:
        name: Format check
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - run: npm run format:check

    typecheck:
        name: Type check
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - run: npx tsc --noEmit

    test:
        name: Test
        needs: setup
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - run: npm run test:coverage

            - name: Coverage report
              if: always()
              uses: davelosert/vitest-coverage-report-action@v2

    build:
        name: Build
        needs: [lint, format, typecheck, test]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore node_modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - run: npm run build
