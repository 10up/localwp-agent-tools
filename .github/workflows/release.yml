name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    validate:
        name: Validate
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Install dependencies
              run: npm ci

            - run: npm run lint
            - run: npm run format:check
            - run: npx tsc --noEmit
            - run: npm run test:coverage
            - run: npm run build

    release:
        name: Package & publish
        needs: validate
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Package add-on
              run: |
                  ADDON_DIR="agent-tools"
                  mkdir -p "$ADDON_DIR"

                  # Copy runtime files
                  cp -r lib "$ADDON_DIR/"
                  cp package.json package-lock.json icon.png README.md "$ADDON_DIR/"

                  # Install only production dependencies (includes bundled)
                  cd "$ADDON_DIR"
                  npm ci --omit=dev
                  cd ..

                  # Create zip
                  zip -r "agent-tools-${GITHUB_REF_NAME}.zip" "$ADDON_DIR"

            - name: Create GitHub release
              run: |
                  gh release create "$GITHUB_REF_NAME" \
                    "agent-tools-${GITHUB_REF_NAME}.zip" \
                    --title "$GITHUB_REF_NAME" \
                    --generate-notes
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
